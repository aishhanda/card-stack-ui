<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Card Stack UI</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="wrapper">

  <div class="side-controls left">
    <button class="circle-btn" id="plus"><img src="Assets/icons8-plus-24.png"></button>
    <button class="circle-btn"><img src="Assets/icons8-arrow-up-24.png"></button>
    <button class="circle-btn"><img src="Assets/icons8-arrow-down-24.png"></button>
  </div>

  <div class="card-stack">
  </div>

<div class="modal" id="callModal">
  <form class="form-card" id="noteForm">
    <h2>New Call</h2>

    <div class="field">
      <label>Image URL</label>
      <input type="text" placeholder="https://example.com/photo.jpg">
    </div>

    <div class="field">
      <label>Full Name</label>
      <input type="text" placeholder="Enter full name">
    </div>

    <div class="field">
      <label>Home Town</label>
      <input type="text" placeholder="Enter home town">
    </div>

    <div class="field">
      <label>Purpose</label>
      <input type="text" placeholder="e.g. Quick appointment note">
    </div>

    <div class="field">
      <label>Category</label>

      <div class="radio-group">
        <label class="radio-pill emergency">
          <input type="radio" name="category">
          <span>Emergency</span>
        </label>

        <label class="radio-pill important">
          <input type="radio" name="category">
          <span>Important</span>
        </label>

        <label class="radio-pill urgent">
          <input type="radio" name="category">
          <span>Urgent</span>
        </label>

        <label class="radio-pill norush">
          <input type="radio" name="category">
          <span>No Rush</span>
        </label>
      </div>
    </div>

    <button class="btn create">Create Note</button>
    <button class="btn close">Close</button>
</form>

</div>
</div>
<script src="script.js"></script>
</body>

</html>
